name: Release and Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "library-tool/src/**"
      - "library-tool/postinstall.js"
      - "library-tool/package.json"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
          cache-dependency-path: "library-tool/pnpm-lock.yaml"

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Verify lockfile exists
        working-directory: ./library-tool
        run: |
          echo "Contents of library-tool directory:"
          ls -la
          echo "Checking for pnpm-lock.yaml:"
          if [ -f "pnpm-lock.yaml" ]; then
            echo "✅ pnpm-lock.yaml exists"
            ls -la pnpm-lock.yaml
          else
            echo "❌ pnpm-lock.yaml not found"
          fi

      - name: Install dependencies
        working-directory: ./library-tool
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        working-directory: ./library-tool
        run: |
          pnpm run test:unit || echo "No unit tests"
          pnpm run test:integration || echo "No integration tests"
          pnpm run test:cli || echo "No CLI tests"
          pnpm run test:performance || echo "No performance tests"
          echo "✅ All test suites finished!"

      - name: Check current version
        id: check
        working-directory: ./library-tool
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if npm view tradux@$CURRENT_VERSION version >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $CURRENT_VERSION already exists on NPM"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $CURRENT_VERSION does not exist on NPM"
          fi

      - name: Bump version if needed
        if: steps.check.outputs.exists == 'true'
        working-directory: ./library-tool
        run: |
          # Fetch and sync with remote branch
          git fetch origin main
          git reset --hard origin/main

          # Always bump patch (manual edits to package.json control major/minor)
          NEW_VERSION=$(pnpm version patch --no-git-tag-version)

          # Commit the version bump
          git add package.json pnpm-lock.yaml
          git commit -m "chore: bump version to $NEW_VERSION"

          # Safe push
          git push --force-with-lease origin main

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest && npm --version

      - name: Clear .npmrc token
        run: |
          NPMRC="${RUNNER_TEMP}/.npmrc"
          echo "//registry.npmjs.org/" > "$NPMRC"

      - name: Publish to NPM
        working-directory: ./library-tool
        run: npm publish --access public --provenance

      - name: Create Git Tag
        run: |
          VERSION=$(node -p "require('./library-tool/package.json').version")
          git tag "v$VERSION"
          git push origin "v$VERSION"
